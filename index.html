<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A&F Smart Uniformes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section class="card">
      <header class="top">
        <div>
          <h2>A&F Smart Uniformes</h2>
          <p>Receba sua estimativa em menos de 1 minuto</p>
        </div>
        <span id="stepCounter">Etapa 1</span>
      </header>

      <div class="progress">
        <div id="progressBar"></div>
      </div>

      <section id="screen"></section>

      <footer class="nav">
        <button id="backBtn" class="btn secondary">Voltar</button>
        <button id="nextBtn" class="btn primary">Avançar</button>
      </footer>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
